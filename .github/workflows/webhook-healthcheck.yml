name: Ops Webhook Healthcheck

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send signed health pings to ops-api
        env:
          OPS_URL: https://ops.engel2ink.com/webhooks/health
          OPS_WEBHOOK_SECRET: ${{ secrets.OPS_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          send() {
            local SITE="$1"
            local TS BODY SIG HTTP TMP
            TS="$(date +%s)"
            BODY="{\"source\":\"github\",\"event\":\"healthcheck\",\"site\":\"${SITE}\",\"state\":\"UP\",\"checked_at\":\"$(date -u +%FT%TZ)\"}"
            SIG="$(printf "%s" "$TS.$BODY" | openssl dgst -sha256 -hmac "$OPS_WEBHOOK_SECRET" -hex | awk '{print $2}')"
            TMP="$(mktemp)"
            HTTP="$(curl -sS -o "$TMP" -w "%{http_code}" -X POST "$OPS_URL" \
              -H "content-type: application/json" \
              -H "x-ops-timestamp: $TS" \
              -H "x-ops-signature: $SIG" \
              --data "$BODY")"
            cat "$TMP" | jq .
            echo "HTTP=$HTTP"
            test "$HTTP" = "200"
            cat "$TMP" | jq -e '.ok == true' >/dev/null
          }
          send everydayengel
          send engel2ink

      - name: Telegram alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ Ops Webhook Healthcheck FAILED: ${GITHUB_REPOSITORY} (#${GITHUB_RUN_NUMBER}) ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true" >/dev/null
          echo "OK"
